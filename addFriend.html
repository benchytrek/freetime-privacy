<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Freetime – Freundschaftsanfrage</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f2f2f7;
            text-align: center;
            padding: 20px;
        }
        h1 { font-size: 28px; margin-bottom: 8px; }
        p  { color: #666; font-size: 16px; }
        a.button {
            display: inline-block;
            margin-top: 24px;
            padding: 16px 32px;
            background: #007AFF;
            color: white;
            border-radius: 14px;
            text-decoration: none;
            font-size: 17px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <h1>Freetime 👋</h1>
    <p>Jemand möchte dein Freund werden!</p>
    <a class="button" id="openApp">In App öffnen</a>

    <script>
        // UID aus URL-Parameter lesen
        const params = new URLSearchParams(window.location.search);
        const from = params.get("from") || "";

        // App-Link setzen
        document.getElementById("openApp").href = "freetime://invite?from=" + from;

        // Automatisch weiterleiten nach kurzer Verzögerung
        if (from) {
            setTimeout(() => {
                window.location.href = "freetime://invite?from=" + from;
            }, 500);
        }
    </script>
</body>
</html>
